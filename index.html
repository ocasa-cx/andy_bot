<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCASA · Customer Intelligence</title>
  <style>
    :root {
      --navy:#0B1F3A;
      --accent:#1c2333;
      --bg:#f4f6f9;
      --text-hi:#1a2733; --text-mid:#637480; --text-lo:#a0b0bc;
      --border:#e4e9ed;
      --font:'Segoe UI',system-ui,sans-serif;
      --chat-w: clamp(300px, 90vw, 400px);
      --chat-h: clamp(400px, 70vh, 580px);
      --fab-b: 72px; --fab-r: 20px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text-hi); display: flex; flex-direction: column; font-size: 13px; }

    /* ── PBI ── */
    #pbi-wrap { flex:1; overflow:hidden; position:relative; }
    #pbi-mask { position:absolute; bottom:0; left:0; right:0; height:36px; background:var(--bg); z-index:20; pointer-events:none; }
    .pbi-placeholder { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-mid);text-align:center;padding:20px; }

    /* ── FAB ── */
    #chat-fab { position:fixed; bottom:var(--fab-b); right:var(--fab-r); width:50px; height:50px; border-radius:14px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 18px rgba(0,0,0,.25); z-index:8000; transition:transform .2s,background .2s; }
    #chat-fab:hover { background:#374151; transform:scale(1.07); }
    #fab-dot { position:absolute; top:4px; right:4px; width:9px; height:9px; border-radius:50%; background:#e74c3c; border:2px solid #fff; display:none; }

    /* Fullscreen */
    #fullscreen-btn { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:6px; padding:5px 14px; background:rgba(11,31,58,.55); border:0.5px solid rgba(255,255,255,.15); border-radius:20px; color:rgba(255,255,255,.7); font-size:11px; font-family:var(--font); cursor:pointer; z-index:7000; transition:background .2s; backdrop-filter:blur(4px); }
    #fullscreen-btn:hover { background:rgba(11,31,58,.85); color:#fff; }
    #fullscreen-btn svg { width:12px; height:12px; }

    /* ── POPUP ── */
    #chat-popup { position:fixed; bottom:calc(var(--fab-b) + 62px); right:var(--fab-r); width:var(--chat-w); height:var(--chat-h); background:#fff; border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,.16); display:flex; flex-direction:column; overflow:hidden; z-index:7999; transform:scale(.9) translateY(20px); opacity:0; pointer-events:none; transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s; }
    #chat-popup.open { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }
    #chat-popup.maximized { bottom:0!important; right:0!important; width:100vw!important; height:100vh!important; border-radius:0; transform:none!important; }
    @media (max-width:480px),(max-height:600px) {
      #chat-popup.open:not(.maximized) { bottom:0!important; right:0!important; width:100vw!important; height:100dvh!important; border-radius:0; }
    }

    /* ── HEADER ── */
    #chat-header { background:var(--navy); padding:9px 12px; display:flex; align-items:center; gap:9px; flex-shrink:0; }
    .ch-avatar { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ch-info { flex:1; }
    .ch-info h3 { font-size:12px; font-weight:600; color:#fff; margin:0; display:flex; align-items:center; gap:6px; }
    .ch-badge { font-size:9.5px; background:rgba(255,255,255,.12); color:rgba(255,255,255,.7); padding:1px 7px; border-radius:10px; font-weight:400; }
    .ch-info p  { font-size:9.5px; color:rgba(255,255,255,.45); margin:1px 0 0; }
    .ch-dot { width:5px; height:5px; border-radius:50%; background:#6ee7b7; flex-shrink:0; animation:pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .ch-actions { display:flex; align-items:center; gap:3px; }
    .ch-btn { background:rgba(255,255,255,.08); border:none; cursor:pointer; color:rgba(255,255,255,.7); width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .ch-btn:hover { background:rgba(255,255,255,.18); }
    .ch-btn svg { width:13px; height:13px; }

    /* ── MESSAGES ── */
    #chat-messages { flex:1; overflow-y:auto; padding:10px 12px 6px; display:flex; flex-direction:column; gap:8px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    #chat-messages::-webkit-scrollbar { width:3px; }
    #chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    .row { display:flex; align-items:flex-end; gap:6px; max-width:88%; animation:fadeup .15s ease both; }
    @keyframes fadeup { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .row.bot  { align-self:flex-start; }
    .row.user { align-self:flex-end; flex-direction:row-reverse; }
    .av { width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .av.bot  { background:transparent; border:none; overflow:visible; }
    .av.user { background:var(--accent); color:#fff; overflow:hidden; font-size:9px; font-weight:600; }
    .bubble { padding:7px 11px; border-radius:13px; font-size:12px; line-height:1.55; max-width:100%; word-break:break-word; }
    .bubble.bot  { background:#f4f5f7; border:0.5px solid #e5e7eb; border-bottom-left-radius:3px; color:var(--text-hi); }
    .bubble.user { background:var(--accent); border-bottom-right-radius:3px; color:#fff; }
    .bubble.provisional { background:#f9fafb; border:0.5px solid #e5e7eb; color:#6b7280; font-size:12px; }
    .prov-dots { display:inline-flex; gap:3px; align-items:center; margin-right:6px; vertical-align:middle; }
    .prov-dot  { width:4px; height:4px; border-radius:50%; background:#9ca3af; animation:pdot 1.2s ease-in-out infinite; }
    .prov-dot:nth-child(2){animation-delay:.15s} .prov-dot:nth-child(3){animation-delay:.3s}
    @keyframes pdot { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .bubble table { border-collapse:collapse; width:100%; margin-top:5px; font-size:11px; }
    .bubble th { background:#f0f2f4; color:var(--text-hi); padding:4px 7px; text-align:left; font-weight:600; border:1px solid #e5e7eb; }
    .bubble td { padding:3px 7px; border:1px solid #f0f0f0; }
    .bubble pre { background:#f0f3f5; border-radius:5px; padding:6px 8px; font-size:10.5px; overflow-x:auto; margin-top:5px; font-family:monospace; }
    /* Chart card — renderiza el HTML del informe en iframe */
    .chart-card { margin-top:6px; border:0.5px solid #e5e7eb; border-radius:10px; overflow:hidden; background:#fff; width:100%; }
    .chart-card iframe { width:100%; border:none; display:block; min-height:400px; }
    .ts { font-size:9.5px; color:var(--text-lo); margin-top:2px; padding:0 2px; }
    .row.user .ts { text-align:right; }
    /* Typing */
    .typing-row { display:flex; align-items:flex-end; gap:6px; align-self:flex-start; }
    .typing-bub { background:#f4f5f7; border:0.5px solid #e5e7eb; border-radius:13px; border-bottom-left-radius:3px; padding:9px 12px; display:flex; align-items:center; gap:4px; }
    .dot { width:4px; height:4px; border-radius:50%; background:#9ca3af; animation:bounce 1.3s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-4px);opacity:.9} }
    /* Suggestions */
    #chat-suggs { padding:6px 10px 7px; display:flex; flex-wrap:wrap; gap:5px; flex-shrink:0; background:#fff; border-top:0.5px solid #f0f0f0; max-height:90px; overflow-y:auto; scrollbar-width:none; }
    #chat-suggs::-webkit-scrollbar { display:none; }
    .chip { background:#fff; border:0.5px solid #e5e7eb; color:var(--text-mid); border-radius:20px; padding:4px 10px; font-size:10.5px; font-family:var(--font); cursor:pointer; transition:background .12s,border-color .12s; white-space:nowrap; }
    .chip:hover { background:#f4f5f7; border-color:#d1d5db; color:var(--text-hi); }
    /* Input */
    #chat-input-area { background:#fff; border-top:0.5px solid #f0f0f0; padding:8px 12px; display:flex; align-items:flex-end; gap:7px; flex-shrink:0; }
    #chat-input { flex:1; background:#f7f9fa; border:0.5px solid #e5e7eb; border-radius:16px; padding:7px 12px; color:var(--text-hi); font-family:var(--font); font-size:12px; resize:none; outline:none; max-height:70px; overflow-y:auto; line-height:1.4; transition:border-color .2s; scrollbar-width:none; }
    #chat-input::-webkit-scrollbar { display:none; }
    #chat-input::placeholder { color:var(--text-lo); }
    #chat-input:focus { border-color:#9ca3af; }
    #chat-send { width:30px; height:30px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s,opacity .15s; }
    #chat-send:hover:not(:disabled) { background:#374151; }
    #chat-send:disabled { opacity:.3; cursor:default; }
    #chat-send svg { width:13px; height:13px; fill:#fff; }
    /* Empty */
    #chat-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; flex:1; text-align:center; padding:16px; color:var(--text-mid); }
    #chat-empty h2 { font-size:12px; font-weight:600; color:var(--text-hi); }
    #chat-empty p  { font-size:11px; max-width:200px; line-height:1.5; }
    #toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#1c2333; color:#fff; font-size:11px; padding:6px 14px; border-radius:20px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:99999; white-space:nowrap; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<!-- PBI -->
<div id="pbi-wrap">
  <div id="pbi-mask"></div>
</div>

<!-- FULLSCREEN -->
<button id="fullscreen-btn" onclick="toggleFullscreen()" title="Pantalla completa">
  <svg id="fs-icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
  </svg>
  <svg id="fs-icon-compress" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
    <path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 0 2 2v3M16 21v-3a2 2 0 0 0 2-2h3"/>
  </svg>
  <span id="fs-label">Pantalla completa</span>
</button>

<!-- FAB -->
<button id="chat-fab" onclick="toggleChat()" title="Andy">
  <div id="fab-dot"></div>
  <svg id="fab-icon-chat" viewBox="0 0 40 40" fill="none" style="width:28px;height:28px;">
    <rect x="8" y="13" width="24" height="17" rx="5" fill="#fff"/>
    <circle cx="15" cy="21" r="2.5" fill="#1c2333"/>
    <circle cx="25" cy="21" r="2.5" fill="#1c2333"/>
    <rect x="15" y="26" width="10" height="2" rx="1" fill="#94a3b8"/>
    <line x1="15" y1="13" x2="13" y2="8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="13" cy="7" r="2" fill="#fff"/>
    <line x1="25" y1="13" x2="27" y2="8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="27" cy="7" r="2" fill="#fff"/>
  </svg>
  <!-- X removida del FAB — el cierre queda solo en el header del chat -->
</button>

<!-- CHAT -->
<div id="chat-popup">
  <div id="chat-header">
    <div class="ch-avatar">
      <svg viewBox="0 0 40 40" fill="none" style="width:28px;height:28px;">
        <circle cx="20" cy="20" r="20" fill="rgba(255,255,255,.15)"/>
        <rect x="11" y="15" width="18" height="13" rx="4" fill="#fff"/>
        <circle cx="16" cy="21" r="2" fill="#1c2333"/>
        <circle cx="24" cy="21" r="2" fill="#1c2333"/>
        <rect x="16" y="25" width="8" height="1.5" rx="0.75" fill="#94a3b8"/>
        <line x1="16" y1="15" x2="14" y2="11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="14" cy="10" r="1.5" fill="#fff"/>
        <line x1="24" y1="15" x2="26" y2="11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="26" cy="10" r="1.5" fill="#fff"/>
      </svg>
    </div>
    <div class="ch-info">
      <h3>Andy <span class="ch-badge">Beta</span></h3>
      <p>Customer Intelligence · OCASA</p>
    </div>
    <span class="ch-dot"></span>
    <div class="ch-actions">
      <button class="ch-btn" onclick="toggleMaximize()" title="Maximizar">
        <svg id="icon-max" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
        <svg id="icon-restore" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
          <path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 0 2 2v3M16 21v-3a2 2 0 0 0 2-2h3"/>
        </svg>
      </button>
      <button class="ch-btn" onclick="toggleChat()" title="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="chat-messages">
    <div id="chat-empty">
      <svg viewBox="0 0 40 40" fill="none" style="width:48px;height:48px;margin-bottom:4px;">
        <circle cx="20" cy="20" r="20" fill="#dbeafe"/>
        <rect x="11" y="15" width="18" height="13" rx="4" fill="#1d4ed8"/>
        <circle cx="16" cy="21" r="2" fill="#fff"/>
        <circle cx="24" cy="21" r="2" fill="#fff"/>
        <rect x="16" y="25" width="8" height="1.5" rx="0.75" fill="#93c5fd"/>
        <line x1="16" y1="15" x2="14" y2="11" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="14" cy="10" r="1.5" fill="#1d4ed8"/>
        <line x1="24" y1="15" x2="26" y2="11" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="26" cy="10" r="1.5" fill="#1d4ed8"/>
      </svg>
      <h2>¿En qué puedo ayudarte?</h2>
      <p>Preguntame sobre SLA, backlog, NPS o métricas operativas.</p>
    </div>
  </div>

  <div id="chat-suggs">
    <button class="chip" onclick="suggest(this)">SLA por sucursal semana pasada</button>
    <button class="chip" onclick="suggest(this)">Backlog acumulado por cliente</button>
    <button class="chip" onclick="suggest(this)">NPS este mes</button>
    <button class="chip" onclick="suggest(this)">Incidencias operativas último mes</button>
    <button class="chip" onclick="suggest(this)">Efectividad 1ra visita por sucursal</button>
    <button class="chip" onclick="suggest(this)">Impacto de SLA por cliente</button>
    <button class="chip" onclick="suggest(this)">Evolutivo SLA últimas 4 semanas</button>
    <button class="chip" onclick="suggest(this)">Backlog histórico por semana</button>
    <button class="chip" onclick="suggest(this)">Correlación backlog y SLA</button>
    <button class="chip" onclick="suggest(this)">Tablero de Brandlive</button>
    <button class="chip" onclick="suggest(this)">Motivos de no entrega</button>
    <button class="chip" onclick="suggest(this)">Desvíos operativos semana pasada</button>
  </div>

  <div id="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="Escribí tu pregunta..." autocomplete="off"></textarea>
    <button id="chat-send" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
  var N8N_WEBHOOK_URL = 'https://n8nappv2.ocasa.com:5688/webhook/e54b71d9-4766-4f96-9282-945fae2faf42';
  var POWERBI_EMBED_URL = 'https://app.powerbi.com/view?r=eyJrIjoiNjAwOWQ3ZmQtYmM2OC00ODYyLWEyYTQtNWZiNzAwN2E5ODM2IiwidCI6IjkxYTViNWM4LTY3M2UtNGE4MC04NzFjLTVlZDM0MTJkZDQ1MSJ9';

  var sessionId   = crypto.randomUUID();
  var isWaiting   = false;
  var chatOpen    = false;
  var maximized   = false;
  var currentUser = { name: 'Usuario', email: 'usuario@ocasa.com', picture: '' };

  var popup   = document.getElementById('chat-popup');
  var msgsEl  = document.getElementById('chat-messages');
  var inputEl = document.getElementById('chat-input');
  var sendBtn = document.getElementById('chat-send');
  var suggsEl = document.getElementById('chat-suggs');
  var emptyEl = document.getElementById('chat-empty');
  var toastEl = document.getElementById('toast');
  var fabDot  = document.getElementById('fab-dot');

  // ── Cargar PBI sin destruir la máscara ───────────────────────────
  (function() {
    var wrap = document.getElementById('pbi-wrap');
    var mask = document.getElementById('pbi-mask');
    var fr = document.createElement('iframe');
    fr.src = POWERBI_EMBED_URL;
    fr.setAttribute('allowfullscreen', 'true');
    fr.setAttribute('allow', 'fullscreen');
    fr.style.cssText = 'width:100%;height:calc(100% + 36px);border:none;display:block;margin-bottom:-36px;position:relative;z-index:1;';
    wrap.insertBefore(fr, mask);
  })();

  // Bienvenida
  setTimeout(function() {
    appendBot('Hola. Soy Andy, el asistente de datos de OCASA. Puedo ayudarte con SLA, backlog, NPS, incidencias y más.', null);
    setTimeout(function() { if (!chatOpen) fabDot.style.display = 'block'; }, 2000);
  }, 500);

  // ── Chat toggle ──────────────────────────────────────────────────
  function toggleChat() {
    chatOpen = !chatOpen;
    popup.classList.toggle('open', chatOpen);
    // FAB siempre muestra el robot — no cambia al cerrar
    fabDot.style.display = 'none';
    if (chatOpen) setTimeout(function() { inputEl.focus(); }, 280);
  }

  function toggleMaximize() {
    maximized = !maximized;
    popup.classList.toggle('maximized', maximized);
    document.getElementById('icon-max').style.display     = maximized ? 'none'  : 'block';
    document.getElementById('icon-restore').style.display = maximized ? 'block' : 'none';
    setTimeout(resizeAllIframes, 300);
  }

  function resizeAllIframes() {
    document.querySelectorAll('.chart-card iframe').forEach(function(iframe) {
      try {
        var doc = iframe.contentDocument;
        if (!doc || !doc.body) return;
        var h = doc.body.scrollHeight;
        if (h > 80) iframe.style.height = Math.min(h + 16, 2400) + 'px';
        var win = iframe.contentWindow;
        if (win && win.Chart) Object.values(win.Chart.instances || {}).forEach(function(c) { try { c.resize(); } catch(e) {} });
      } catch(e) {}
    });
  }

  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(function() { if (maximized) setTimeout(resizeAllIframes, 100); }).observe(popup);
  }

  // ── Input ────────────────────────────────────────────────────────
  inputEl.addEventListener('input', function() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 70) + 'px';
    sendBtn.disabled = inputEl.value.trim() === '' || isWaiting;
  });
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
  });

  function suggest(btn) {
    if (!chatOpen) toggleChat();
    setTimeout(function() { inputEl.value = btn.textContent; inputEl.dispatchEvent(new Event('input')); sendMessage(); }, 150);
  }

  function getProvisionalMessage(text) {
    var t = (text || '').toLowerCase();
    if (t.indexOf('impacto') >= 0 && t.indexOf('sla') >= 0) return 'Calculando impacto de SLA...';
    if (t.indexOf('nps') >= 0 && (t.indexOf('motivo') >= 0 || t.indexOf('detractor') >= 0)) return 'Analizando mensajes del NPS...';
    if (t.indexOf('nps') >= 0)        return 'Consultando datos de NPS...';
    if (t.indexOf('backlog') >= 0)    return 'Consultando backlog operativo...';
    if (t.indexOf('efectividad') >= 0)return 'Calculando efectividad de entregas...';
    if (t.indexOf('sla') >= 0)        return 'Consultando SLA desde el Data Warehouse...';
    if (t.indexOf('incidencia') >= 0 || t.indexOf('desv') >= 0) return 'Analizando incidencias operativas...';
    if (t.indexOf('correlaci') >= 0)  return 'Calculando correlación entre métricas...';
    if (t.indexOf('excel') >= 0 || t.indexOf('export') >= 0) return 'Preparando datos para exportar...';
    return 'Procesando tu consulta...';
  }

  // ── Send ─────────────────────────────────────────────────────────
  async function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || isWaiting) return;
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
    suggsEl.style.display = 'none';

    appendUser(text);
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true; isWaiting = true;

    var provId = appendProvisional(getProvisionalMessage(text));
    var tid    = showTyping();

    try {
      var res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message:    text,
          session_id: sessionId,
          timestamp:  new Date().toISOString(),
          user_email: currentUser.email,
          user_name:  currentUser.name
        })
      });
      removeProvisional(provId); removeTyping(tid);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data  = await res.json();
      var reply = data.response || data.message || data.text || data.answer || 'Sin respuesta.';
      var html  = data.html || data.chart_html || null;
      appendBot(reply, html);
    } catch(err) {
      removeProvisional(provId); removeTyping(tid);
      appendBot('No se pudo conectar. Verificá el flujo o intentá más tarde.', null);
      showToast('Error de conexión');
    }

    isWaiting = false;
    sendBtn.disabled = inputEl.value.trim() === '';
    inputEl.focus();
  }

  // ── Render helpers ───────────────────────────────────────────────
  function botSVG() {
    return '<svg viewBox="0 0 40 40" fill="none" style="width:22px;height:22px;">' +
      '<circle cx="20" cy="20" r="20" fill="#dbeafe"/>' +
      '<rect x="11" y="15" width="18" height="13" rx="4" fill="#1d4ed8"/>' +
      '<circle cx="16" cy="21" r="2" fill="#fff"/>' +
      '<circle cx="24" cy="21" r="2" fill="#fff"/>' +
      '<rect x="16" y="25" width="8" height="1.5" rx="0.75" fill="#93c5fd"/>' +
      '<line x1="16" y1="15" x2="14" y2="11" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>' +
      '<circle cx="14" cy="10" r="1.5" fill="#1d4ed8"/>' +
      '<line x1="24" y1="15" x2="26" y2="11" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>' +
      '<circle cx="26" cy="10" r="1.5" fill="#1d4ed8"/>' +
      '</svg>';
  }

  function botAv() {
    var av = document.createElement('div');
    av.className = 'av bot';
    av.innerHTML = botSVG();
    return av;
  }

  function appendUser(text) {
    var row = document.createElement('div'); row.className = 'row user';
    var av  = document.createElement('div'); av.className = 'av user';
    av.textContent = (currentUser.name || 'U')[0].toUpperCase();
    var bub = document.createElement('div'); bub.className = 'bubble user'; bub.textContent = text;
    var ts  = document.createElement('div'); ts.className = 'ts'; ts.textContent = now();
    var inn = document.createElement('div'); inn.style.cssText = 'display:flex;flex-direction:column;';
    inn.appendChild(bub); inn.appendChild(ts);
    row.appendChild(inn); row.appendChild(av);
    msgsEl.appendChild(row); scroll();
  }

  function appendProvisional(text) {
    var id  = 'prov_' + Date.now();
    var row = document.createElement('div'); row.className = 'row bot'; row.id = id;
    var bub = document.createElement('div'); bub.className = 'bubble bot provisional';
    bub.innerHTML = '<span class="prov-dots"><span class="prov-dot"></span><span class="prov-dot"></span><span class="prov-dot"></span></span>' + text;
    var inn = document.createElement('div'); inn.style.cssText = 'display:flex;flex-direction:column;';
    inn.appendChild(bub);
    row.appendChild(botAv()); row.appendChild(inn);
    msgsEl.appendChild(row); scroll();
    return id;
  }

  function removeProvisional(id) { var el = document.getElementById(id); if (el) el.remove(); }

  function appendBot(text, chartHtml) {
    var row = document.createElement('div'); row.className = 'row bot';
    var inn = document.createElement('div'); inn.style.cssText = 'display:flex;flex-direction:column;max-width:100%;';

    if (text) {
      var bub = document.createElement('div'); bub.className = 'bubble bot';
      bub.innerHTML = fmt(text);
      inn.appendChild(bub);
    }

    // ── Renderizar HTML del informe en iframe ─────────────────────
    if (chartHtml && chartHtml.trim().length > 50) {
      var card   = document.createElement('div'); card.className = 'chart-card';
      var iframe = document.createElement('iframe');
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-downloads');
      iframe.style.cssText = 'width:100%;border:none;display:block;min-height:400px;';
      card.appendChild(iframe);
      inn.appendChild(card);

      var rCSS = '<style>' +
        '*,*::before,*::after{box-sizing:border-box!important}' +
        'html{overflow-x:hidden!important}' +
        'body{margin:0!important;padding:8px!important;overflow-x:hidden!important;max-width:100vw!important;word-break:break-word!important}' +
        'img,canvas,video,table{max-width:100%!important}' +
        '</style>';

      var full = chartHtml.indexOf('</head>') >= 0
        ? chartHtml.replace('</head>', rCSS + '</head>')
        : rCSS + chartHtml;

      requestAnimationFrame(function() {
        try {
          iframe.contentDocument.open();
          iframe.contentDocument.write(full);
          iframe.contentDocument.close();
        } catch(e) {
          // Fallback: srcdoc
          iframe.srcdoc = full;
        }
        function adjustHeight() {
          try {
            var h = iframe.contentDocument.body.scrollHeight;
            if (h > 80) iframe.style.height = Math.min(h + 24, 2400) + 'px';
          } catch(e) {}
        }
        iframe.onload = function() { adjustHeight(); setTimeout(adjustHeight, 800); setTimeout(adjustHeight, 2000); };
        setTimeout(adjustHeight, 300);
      });
    }

    var ts = document.createElement('div'); ts.className = 'ts'; ts.textContent = now();
    inn.appendChild(ts);
    row.appendChild(botAv()); row.appendChild(inn);
    msgsEl.appendChild(row); scroll();
  }

  function showTyping() {
    var id  = 't' + Date.now();
    var row = document.createElement('div'); row.className = 'typing-row'; row.id = id;
    row.appendChild(botAv());
    var bub = document.createElement('div'); bub.className = 'typing-bub';
    bub.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    row.appendChild(bub);
    msgsEl.appendChild(row); scroll();
    return id;
  }
  function removeTyping(id) { var el = document.getElementById(id); if (el) el.remove(); }

  function fmt(raw) {
    return raw
      .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, "<code style='background:#f0f0f0;color:#374151;padding:1px 4px;border-radius:3px;font-size:10.5px;'>$1</code>")
      .replace(/\n/g, '<br>');
  }

  function scroll()   { msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' }); }
  function now()      { return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }); }
  function showToast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); setTimeout(function() { toastEl.classList.remove('show'); }, 3000); }

  // ── Fullscreen ───────────────────────────────────────────────────
  function toggleFullscreen() {
    var el = document.documentElement;
    var fsAvail = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    var inFs = document.fullscreenElement || document.webkitFullscreenElement;
    if (!inFs && fsAvail) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el)
        .catch(function() { window.open(window.location.href, '_blank'); });
    } else if (inFs) {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
    } else {
      window.open(window.location.href, '_blank');
    }
  }
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(function(evt) {
    document.addEventListener(evt, function() {
      var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      var ex = document.getElementById('fs-icon-expand');
      var co = document.getElementById('fs-icon-compress');
      var lb = document.getElementById('fs-label');
      if (ex) ex.style.display = isFs ? 'none' : 'block';
      if (co) co.style.display = isFs ? 'block' : 'none';
      if (lb) lb.textContent = isFs ? 'Salir de pantalla completa' : 'Pantalla completa';
    });
  });
</script>
</body>
</html>
